<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            padding: 8px;
            width: 80px;
            margin-right: 10px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #msg {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verification</h2>
        <p>6 - 4 = ?</p>

        <input type="text" id="answer">
        <button onclick="checkAnswer()">Check</button>

        <p id="msg"></p>
    </div>

    <script>
        function checkAnswer() {
            const answer = document.getElementById("answer").value.trim();

            if (answer === "2") {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1";
            } else {
                document.getElementById("msg").textContent = "Wrong answer!";
            }
        }
    </script>
</body>
</html>
